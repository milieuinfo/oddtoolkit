name: Docs and Javadocs

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs:
    name: Build VitePress Docs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect docs lockfile
        id: docs-lockfile
        run: |
          if [ -f package-lock.json ]; then
            echo "has_lockfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_lockfile=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js (with npm cache)
        if: steps.docs-lockfile.outputs.has_lockfile == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Setup Node.js (without npm cache)
        if: steps.docs-lockfile.outputs.has_lockfile != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (npm ci)
        if: steps.docs-lockfile.outputs.has_lockfile == 'true'
        run: npm ci

      - name: Install dependencies (npm install)
        if: steps.docs-lockfile.outputs.has_lockfile != 'true'
        run: npm install

      - name: Build docs
        run: npm run docs:build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: vitepress-dist
          path: docs/.vitepress/dist

  javadocs:
    name: Generate Javadocs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Generate Javadocs
        run: mvn -B -ntp javadoc:javadoc -DskipTests

      - name: Upload Javadocs artifact
        uses: actions/upload-artifact@v4
        with:
          name: javadocs
          path: target/reports/apidocs
